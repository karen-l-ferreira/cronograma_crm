<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronograma CRM — Adiante Recebíveis · Jun–Jul 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand-blue:#0660FE;
  --brand-navy:#193469;
  --brand-white:#ffffff;

  --bg:#f0f4ff;
  --bg2:#ffffff;
  --bg3:#e8eef8;
  --bg4:#dde6f4;

  --border:rgba(6,96,254,0.10);
  --border2:rgba(25,52,105,0.15);
  --border3:rgba(25,52,105,0.28);

  --text:#0d1b3e;
  --text2:#3a5080;
  --text3:#7a94bf;

  --shadow-sm:0 1px 3px rgba(6,96,254,0.07),0 1px 6px rgba(25,52,105,0.04);
  --shadow:0 4px 16px rgba(6,96,254,0.13),0 1px 4px rgba(25,52,105,0.08);
  --shadow-card:0 2px 12px rgba(25,52,105,0.08),0 1px 3px rgba(6,96,254,0.05);

  --carteira:#0660FE;  --carteira-bg:rgba(6,96,254,0.07);  --carteira-bg2:rgba(6,96,254,0.14);  --carteira-border:rgba(6,96,254,0.24);  --carteira-text:#0040cc;
  --churn:#d4381c;     --churn-bg:rgba(212,56,28,0.07);    --churn-bg2:rgba(212,56,28,0.14);    --churn-border:rgba(212,56,28,0.26);    --churn-text:#9a2510;
  --plus:#6c3fc4;      --plus-bg:rgba(108,63,196,0.07);    --plus-bg2:rgba(108,63,196,0.14);    --plus-border:rgba(108,63,196,0.26);    --plus-text:#47299a;

  --email:#0f8c5c;     --email-bg:rgba(15,140,92,0.07);    --email-bg2:rgba(15,140,92,0.13);    --email-border:rgba(15,140,92,0.26);    --email-text:#0a5c3c;
  --whats:#0e7a8a;     --whats-bg:rgba(14,122,138,0.07);   --whats-bg2:rgba(14,122,138,0.13);   --whats-border:rgba(14,122,138,0.26);   --whats-text:#0a5260;
  --sms:#a06200;       --sms-bg:rgba(160,98,0,0.07);       --sms-bg2:rgba(160,98,0,0.13);       --sms-border:rgba(160,98,0,0.26);       --sms-text:#6e4300;

  --warn:#c45c00;
  --warn-bg:rgba(196,92,0,0.08);
  --warn-border:rgba(196,92,0,0.27);

  --radius:12px;--radius-sm:8px;--radius-xs:6px;
}

html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.6;min-height:100vh}

/* ─── HEADER ─────────────────────── */
.site-header{
  position:sticky;top:0;z-index:100;
  background:var(--brand-navy);
  border-bottom:1px solid rgba(255,255,255,0.07);
  padding:0 2rem;display:flex;align-items:center;gap:1.5rem;height:60px;
  box-shadow:0 2px 24px rgba(25,52,105,0.45);
}
.header-brand{display:flex;align-items:center;gap:12px;flex-shrink:0}
.header-logo{
  width:34px;height:34px;
  background:var(--brand-blue);
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(6,96,254,0.55);flex-shrink:0;
}
.header-logo svg{width:18px;height:18px}
.brand-name{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.02em;line-height:1.2}
.brand-sub{font-size:10px;color:rgba(255,255,255,0.45);font-family:'DM Mono',monospace;letter-spacing:.06em}

/* ─── MES FILTER ─────────────────── */
.mes-filter{display:flex;align-items:center;gap:6px;flex:1}
.filter-label{font-size:9px;font-family:'DM Mono',monospace;color:rgba(255,255,255,0.38);text-transform:uppercase;letter-spacing:.14em;white-space:nowrap;flex-shrink:0}
.fbtn{
  font-size:11.5px;font-weight:600;padding:5px 14px;
  border-radius:20px;border:1px solid rgba(255,255,255,0.14);
  background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.5);cursor:pointer;
  white-space:nowrap;transition:all .15s;flex-shrink:0;
}
.fbtn:hover{background:rgba(255,255,255,0.13);border-color:rgba(255,255,255,0.28);color:rgba(255,255,255,0.85)}
.fbtn.active{background:var(--brand-blue);border-color:rgba(6,96,254,0.7);color:#fff;box-shadow:0 2px 8px rgba(6,96,254,0.4)}
.count-chip{font-size:10px;font-family:'DM Mono',monospace;color:rgba(255,255,255,0.38);white-space:nowrap;margin-left:auto;flex-shrink:0}
.count-chip span{color:rgba(255,255,255,0.8);font-weight:600}

/* ─── BARRA DE PROGRESSO ─────────── */
.progress-bar{
  background:var(--brand-navy);
  border-bottom:1px solid rgba(255,255,255,0.06);
  padding:9px 2rem;
  display:flex;align-items:center;gap:16px;
}
.progress-track{flex:1;height:5px;background:rgba(255,255,255,0.11);border-radius:10px;overflow:hidden}
.progress-fill{height:100%;background:var(--brand-blue);border-radius:10px;transition:width .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 10px rgba(6,96,254,0.65)}
.progress-text{font-size:10px;font-family:'DM Mono',monospace;color:rgba(255,255,255,0.45);white-space:nowrap;flex-shrink:0}
.progress-text b{color:rgba(255,255,255,0.85)}

/* ─── MAIN ───────────────────────── */
.main{max-width:1280px;margin:0 auto;padding:2.5rem 2rem 5rem}

/* ─── MONTH ──────────────────────── */
.month-block{margin-bottom:3.5rem}
.month-header{display:flex;align-items:center;gap:14px;margin-bottom:2rem;padding-bottom:14px;border-bottom:2px solid var(--border2)}
.month-title{font-size:30px;font-weight:700;color:var(--brand-navy);letter-spacing:-.04em;line-height:1}
.month-meta{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);letter-spacing:.1em;padding:4px 11px;border:1px solid var(--border2);border-radius:20px;background:var(--bg2)}

/* ─── WEEK ───────────────────────── */
.week-block{margin-bottom:2rem}
.week-label{
  font-size:9px;font-family:'DM Mono',monospace;color:var(--text3);
  text-transform:uppercase;letter-spacing:.16em;
  margin-bottom:1rem;display:flex;align-items:center;gap:10px;
}
.week-label::after{content:'';flex:1;height:1px;background:var(--border)}
.week-tema{font-family:'DM Mono',monospace;color:var(--brand-blue);font-weight:600;letter-spacing:.04em;text-transform:none}
.week-freq{font-size:9px;font-family:'DM Mono',monospace;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-xs);padding:2px 9px;white-space:nowrap}

/* ─── DAY BLOCK ──────────────────── */
.day-block{margin-bottom:8px;border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-card)}
.day-header{
  display:flex;align-items:center;gap:12px;padding:13px 18px;
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:var(--radius);
  cursor:pointer;user-select:none;transition:all .15s;
}
.day-header:hover{background:var(--bg3);border-color:var(--border3);box-shadow:var(--shadow)}
.day-header.open{border-radius:var(--radius) var(--radius) 0 0;border-bottom-color:var(--border)}

/* HOJE */
.day-block.hoje .day-header{
  border-color:var(--brand-blue);border-width:2px;
  background:rgba(6,96,254,0.04);
}
.day-block.hoje .day-header:hover{background:rgba(6,96,254,0.07)}
.day-block.hoje .day-date{color:var(--brand-blue)}
.hoje-badge{
  font-size:9px;font-family:'DM Mono',monospace;
  background:var(--brand-blue);color:#fff;
  padding:2px 9px;border-radius:20px;font-weight:700;letter-spacing:.07em;
  flex-shrink:0;
}
/* PASSADO */
.day-block.passado .day-header{background:var(--bg3);opacity:.72}
.day-block.passado .day-date{color:var(--text3)}

.day-date{font-family:'DM Mono',monospace;font-size:13px;font-weight:600;color:var(--brand-navy);min-width:54px;letter-spacing:.02em}
.day-weekday{font-size:11px;color:var(--text3);font-weight:500;min-width:62px}
.day-chips{display:flex;gap:4px;flex-wrap:wrap;margin-left:2px;flex:1}
.day-chip{font-size:9px;padding:2px 9px;border-radius:10px;font-weight:600;letter-spacing:.02em}
.chip-carteira{background:var(--carteira-bg);color:var(--carteira-text);border:1px solid var(--carteira-border)}
.chip-churn{background:var(--churn-bg);color:var(--churn-text);border:1px solid var(--churn-border)}
.chip-plus{background:var(--plus-bg);color:var(--plus-text);border:1px solid var(--plus-border)}
.chip-email{background:var(--email-bg);color:var(--email-text);border:1px solid var(--email-border)}
.chip-whats{background:var(--whats-bg);color:var(--whats-text);border:1px solid var(--whats-border)}
.chip-sms{background:var(--sms-bg);color:var(--sms-text);border:1px solid var(--sms-border)}
.day-count{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);white-space:nowrap;font-weight:500}
.toggle-icon{font-size:12px;color:var(--text3);transition:transform .2s cubic-bezier(.4,0,.2,1);flex-shrink:0}
.day-header.open .toggle-icon{transform:rotate(180deg)}
.day-rows{border:1px solid var(--border2);border-top:none;border-radius:0 0 var(--radius) var(--radius);overflow:hidden;display:none}
.day-rows.open{display:block}

/* ─── FERIADO ────────────────────── */
.feriado{
  display:flex;align-items:center;gap:10px;padding:13px 18px;
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);
  font-size:12px;color:var(--text3);font-style:italic;margin-bottom:8px;font-weight:500;
}

/* ─── ROW ────────────────────────── */
.row{
  display:grid;
  grid-template-columns:46px 42px 114px 114px 1fr;
  border-top:1px solid var(--border);background:var(--bg2);
  transition:background .12s,opacity .2s;
}
.row:first-child{border-top:none}
.row:hover{background:rgba(6,96,254,0.025)}
.row.done{background:var(--bg3);opacity:.46}
.row.done .copy-body{text-decoration:line-through;color:var(--text3)}

.cell{padding:13px 15px;border-right:1px solid var(--border)}
.cell:last-child{border-right:none}

/* checkbox */
.chk-cell{display:flex;align-items:flex-start;justify-content:center;padding:15px 0;border-right:1px solid var(--border)}
.chk-cell input{width:15px;height:15px;cursor:pointer;accent-color:var(--brand-blue)}

/* ─── ACTION BUTTONS ─────────────── */
.row-actions{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:6px 5px;border-right:1px solid var(--border);
}
.action-btn{
  background:none;border:1px solid transparent;cursor:pointer;
  width:26px;height:26px;border-radius:var(--radius-xs);
  color:var(--text3);transition:all .15s;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.action-btn svg{width:13px;height:13px;display:block;flex-shrink:0}
.action-btn:hover{color:var(--text2);background:var(--bg3);border-color:var(--border2)}
.action-btn.active{background:var(--sms-bg2);border-color:var(--sms-border);color:var(--sms-text)}
.action-btn.editing{background:var(--email-bg2);border-color:var(--email-border);color:var(--email-text)}
.action-btn.copied{background:var(--email-bg2);border-color:var(--email-border);color:var(--email-text)}
.action-btn.del{color:var(--churn-text);opacity:0}
.row:hover .action-btn.del{opacity:1}
.action-btn.del:hover{background:var(--churn-bg2);border-color:var(--churn-border)}

/* ─── BADGES ─────────────────────── */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:10px;font-weight:600;padding:3px 10px;
  border-radius:20px;width:fit-content;letter-spacing:.01em;
}
.badge svg{width:10px;height:10px;flex-shrink:0}
.badge-carteira{background:var(--carteira-bg);color:var(--carteira-text);border:1px solid var(--carteira-border)}
.badge-churn{background:var(--churn-bg);color:var(--churn-text);border:1px solid var(--churn-border)}
.badge-plus{background:var(--plus-bg);color:var(--plus-text);border:1px solid var(--plus-border)}
.badge-email{background:var(--email-bg);color:var(--email-text);border:1px solid var(--email-border)}
.badge-whats{background:var(--whats-bg);color:var(--whats-text);border:1px solid var(--whats-border)}
.badge-sms{background:var(--sms-bg);color:var(--sms-text);border:1px solid var(--sms-border)}

/* ─── COPY CONTENT ───────────────── */
.copy-assunto{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);margin-bottom:5px;letter-spacing:.02em;font-weight:500}
.copy-body{font-size:13px;color:var(--text);line-height:1.65;white-space:pre-line}
.alerta{
  display:inline-flex;align-items:center;gap:4px;
  font-size:9.5px;font-weight:600;padding:2px 9px;
  border-radius:20px;background:var(--warn-bg);color:var(--warn);
  border:1px solid var(--warn-border);margin-top:5px;width:fit-content;
}

/* ─── NOTES ──────────────────────── */
.note-row{
  background:rgba(160,98,0,0.04);
  border-top:1px solid rgba(160,98,0,0.13);
  padding:11px 15px 13px;display:none;
}
.note-row.open{display:block}
.note-label-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.note-label{font-size:9px;font-family:'DM Mono',monospace;color:var(--sms-text);text-transform:uppercase;letter-spacing:.12em;font-weight:600}
.note-del-btn{
  font-size:10px;font-family:'Inter',sans-serif;color:var(--churn-text);
  background:none;border:1px solid var(--churn-border);border-radius:20px;
  padding:2px 10px;cursor:pointer;transition:all .15s;font-weight:500;
}
.note-del-btn:hover{background:var(--churn-bg)}
.note-row textarea{
  width:100%;min-height:72px;resize:vertical;
  font-family:'Inter',sans-serif;font-size:13px;color:var(--text);
  background:#fff;border:1px solid rgba(160,98,0,0.27);
  border-radius:var(--radius-sm);padding:10px 12px;outline:none;line-height:1.6;
  transition:border-color .15s,box-shadow .15s;
}
.note-row textarea:focus{border-color:var(--sms);box-shadow:0 0 0 3px var(--sms-bg)}
.note-row textarea::placeholder{color:var(--text3);font-style:italic}

/* ─── EDIT MODE ──────────────────── */
.copy-body[contenteditable="true"]{outline:none;cursor:text;background:rgba(6,96,254,0.04);border-radius:4px;padding:2px 4px}

/* ─── MISC ───────────────────────── */
.empty-state{text-align:center;padding:5rem;color:var(--text3);font-size:13px}

/* ─── ADD DISPARO ────────────────── */
.add-disparo-wrap{background:var(--bg2)}
.add-disparo-btn{
  display:flex;align-items:center;gap:8px;
  width:100%;padding:11px 18px;
  background:none;border:none;border-top:1px solid var(--border);
  color:var(--text3);font-size:12px;font-family:'Inter',sans-serif;font-weight:500;
  cursor:pointer;transition:all .15s;text-align:left;
}
.add-disparo-btn svg{width:14px;height:14px;flex-shrink:0;opacity:.55}
.add-disparo-btn:hover{background:var(--carteira-bg);color:var(--carteira-text)}
.add-disparo-btn:hover svg{opacity:1}

.add-form{display:none;padding:18px 18px 16px;background:var(--bg3);border-top:1px solid var(--border2);animation:slideDown .18s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:none}}
.add-form.open{display:block}
.add-form-grid{display:grid;grid-template-columns:1fr 1fr 2fr;gap:10px;margin-bottom:10px}
.add-form-field{display:flex;flex-direction:column;gap:5px}
.add-form-field label,.add-form-msg label{font-size:9px;font-family:'DM Mono',monospace;color:var(--text3);text-transform:uppercase;letter-spacing:.14em;font-weight:600}
.add-form select,.add-form input[type=text]{
  padding:8px 10px;border:1px solid var(--border2);border-radius:var(--radius-sm);
  background:var(--bg2);color:var(--text);
  font-family:'Inter',sans-serif;font-size:12.5px;font-weight:500;
  outline:none;transition:border-color .15s,box-shadow .15s;
}
.add-form select:focus,.add-form input[type=text]:focus{border-color:var(--brand-blue);box-shadow:0 0 0 3px rgba(6,96,254,0.11)}
.add-form-msg{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.add-form textarea{
  width:100%;min-height:76px;resize:vertical;padding:10px 11px;
  border:1px solid var(--border2);border-radius:var(--radius-sm);
  background:var(--bg2);color:var(--text);
  font-family:'Inter',sans-serif;font-size:12.5px;
  outline:none;line-height:1.6;transition:border-color .15s,box-shadow .15s;
}
.add-form textarea:focus{border-color:var(--brand-blue);box-shadow:0 0 0 3px rgba(6,96,254,0.11)}
.add-form textarea::placeholder,.add-form input::placeholder{color:var(--text3)}
.add-form-actions{display:flex;gap:8px;justify-content:flex-end}
.add-form-save{
  padding:8px 20px;border-radius:var(--radius-sm);border:none;cursor:pointer;
  background:var(--brand-blue);color:#fff;
  font-size:12px;font-family:'Inter',sans-serif;font-weight:600;
  transition:opacity .15s,box-shadow .15s;
  box-shadow:0 2px 8px rgba(6,96,254,0.35);
}
.add-form-save:hover{opacity:.88;box-shadow:0 4px 14px rgba(6,96,254,0.45)}
.add-form-cancel{
  padding:8px 15px;border-radius:var(--radius-sm);
  border:1px solid var(--border2);cursor:pointer;
  background:transparent;color:var(--text2);
  font-size:12px;font-family:'Inter',sans-serif;font-weight:500;
  transition:all .15s;
}
.add-form-cancel:hover{background:var(--bg4);border-color:var(--border3)}


@media(max-width:700px){.add-form-grid{grid-template-columns:1fr 1fr}}
@media(max-width:900px){
  .row{grid-template-columns:42px 38px 96px 1fr}
  .row .cell:nth-child(4){display:none}
  .main{padding:1.5rem 1rem 4rem}
}
@media(max-width:600px){
  .row{grid-template-columns:38px 34px 1fr}
  .row .cell:nth-child(3),.row .cell:nth-child(4){display:none}
  .main{padding:1rem 1rem 3rem}
  .site-header{flex-wrap:wrap;height:auto;padding:.75rem 1rem;gap:.75rem}
  .month-title{font-size:24px}
}
</style>
</head>
<body>
<header class="site-header">
  <div class="header-brand">
    <div class="header-logo">
      <svg viewBox="0 0 18 18" fill="none">
        <path d="M9 2L16 15H2L9 2Z" fill="white" fill-opacity=".95"/>
      </svg>
    </div>
    <div>
      <div class="brand-name">Adiante Recebíveis</div>
      <div class="brand-sub">Cronograma CRM · Jun–Jul 2026</div>
    </div>
  </div>
  <div class="mes-filter" id="mesFilter">
    <span class="filter-label">Mês</span>
    <button class="fbtn active" data-mes="jun">Junho</button>
    <button class="fbtn active" data-mes="jul">Julho</button>
    <div class="count-chip" id="counter">— disparos</div>
  </div>
</header>
<div class="progress-bar">
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-text" id="progressText"><b>0</b> de <b id="progressTotal">0</b> disparos concluídos (0%)</div>
</div>

<main class="main" id="app"></main>

// ─── Data de hoje ───
const _hoje = new Date();
const _todayStr = `${String(_hoje.getDate()).padStart(2,'0')}/${String(_hoje.getMonth()+1).padStart(2,'0')}`;

function isToday(data){ return data === _todayStr; }
function isPast(data){
  const [dd,mm] = data.split('/').map(Number);
  const hd = _hoje.getDate(), hm = _hoje.getMonth()+1;
  return mm < hm || (mm === hm && dd < hd);
}

const COPY_KEY    = "crm_copies";

let noteState    = JSON.parse(localStorage.getItem(NOTE_KEY)    || "{}");
let copyState    = JSON.parse(localStorage.getItem(COPY_KEY)    || "{}");

window.toggleDone = function(id){
  if(doneState[id]) delete doneState[id]; else doneState[id] = true;
  localStorage.setItem(DONE_KEY, JSON.stringify(doneState));
  const row = document.getElementById("row-"+id);
  if(row) row.classList.toggle("done", !!doneState[id]);
  updateProgress();
};

let _totalDisparos = 0;

function updateProgress(){
  const done = Object.keys(doneState).filter(k=>doneState[k]).length;
  const total = _totalDisparos;
  const pct = total > 0 ? Math.round((done/total)*100) : 0;
  const fill = document.getElementById("progressFill");
  const text = document.getElementById("progressText");
  if(fill) fill.style.width = pct+"%";
  if(text) text.innerHTML = `<b>${done}</b> de <b>${total}</b> disparos concluídos (${pct}%)`;
}

    <div class="cell">${assuntoHtml}<div class="copy-body" id="copy-${id}">${copyText.replace(/\n/g,"<br>")}</div></div>
  </div>
  <div class="note-row${hasNote?" open":""}" id="note-row-${id}">

      <span class="note-label">Minhas anotações</span>
      ${hasNote?`<button class="note-del-btn" onclick="deleteNote('${id}')">Apagar</button>`:""}
    </div>
    <textarea placeholder="Escreva suas observações aqui…" oninput="saveNote('${id}',this.value)">${noteText}</textarea>
  </div>`;
}

function render(){
  let total = 0;
  let html = "";
  let curMes = "";
  let todayId = null;

  WEEKS.forEach((wk, wIdx) => {
    if(!state.mes.has(wk.mes)) return;

    let daysHtml = "";
    let wkVisible = false;

    wk.dias.forEach((dia) => {
      if(dia.feriado){
        daysHtml += `<div class="feriado">📅 ${dia.data} ${dia.diaSem} — ${dia.feriado}</div>`;
        return;
      }

      const dayKey = `${wk.mes}_${wIdx}_${dia.data.replace('/','-')}`;
      const ehHoje = isToday(dia.data);
      const ehPassado = isPast(dia.data);
      if(ehHoje) todayId = `day-block-${dayKey}`;

      const vis = dia.disparos.filter((d, i) => !deletedState[`${dayKey}_${i}`]);
      const addedRows = addedState[dayKey] || [];
      const hasRows = vis.length > 0 || addedRows.length > 0;
      if(hasRows) wkVisible = true;

      const segs = [...new Set(vis.map(d=>d.seg))];
      const canais = [...new Set(vis.map(d=>d.canal))];
      const segChips = segs.map(s=>`<span class="day-chip chip-${s.toLowerCase()}">${s}</span>`).join("");
      const canalChips = canais.map(c=>`<span class="day-chip ${chipCanal(c)}">${c}</span>`).join("");
      const countTxt = vis.length > 0
        ? `<span class="day-count">${vis.length} disparo${vis.length>1?"s":""}</span>`
        : `<span class="day-count" style="font-style:italic;opacity:.65">sem disparo</span>`;

      const hojeExtra = ehHoje ? `<span class="hoje-badge">HOJE</span>` : "";

      // Hoje: aberto. Passado: fechado. Futuro com rows: aberto.
      const shouldOpen = ehHoje || (!ehPassado && hasRows);

      const rowsHtml = vis.map((d,i)=>{ total++; return makeRowHtml(d,`${dayKey}_${i}`,`deleteRow('${dayKey}_${i}')`); }).join("");
      const addedHtml = addedRows.map(d=>{ total++; return makeRowHtml(d,`added_${d.uid}`,`deleteAddedRow('${dayKey}','${d.uid}')`); }).join("");

      daysHtml += `<div class="day-block${ehHoje?" hoje":""}${ehPassado&&!ehHoje?" passado":""}" id="day-block-${dayKey}">
        <div class="day-header${shouldOpen?" open":""}" onclick="toggleDay(this)">
          <span class="day-date">${dia.data}</span>
          <span class="day-weekday">${dia.diaSem}</span>
          ${hojeExtra}
          <div class="day-chips">${segChips}${canalChips}${countTxt}</div>
          <span class="toggle-icon">▾</span>
        </div>
        <div class="day-rows${shouldOpen?" open":""}" id="day-rows-${dayKey}">
          ${rowsHtml}${addedHtml}
          <div class="add-disparo-wrap">
            <button class="add-disparo-btn" onclick="showAddForm('${dayKey}')">
              <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M7 2v10M2 7h10"/></svg>
              Novo disparo
            </button>
            <div class="add-form" id="add-form-${dayKey}">
              <div class="add-form-grid">
                <div class="add-form-field"><label>Segmento</label>
                  <select id="add-seg-${dayKey}"><option value="Carteira">Carteira</option><option value="Churn">Churn</option><option value="Plus">Plus</option></select>
                </div>
                <div class="add-form-field"><label>Canal</label>
                  <select id="add-canal-${dayKey}"><option value="E-mail">E-mail</option><option value="WhatsApp">WhatsApp</option><option value="SMS">SMS</option></select>
                </div>
                <div class="add-form-field"><label>Assunto <span style="opacity:.4;font-size:8px">opcional</span></label>
                  <input type="text" id="add-assunto-${dayKey}" placeholder="Ex: Limite liberado para sua operação">
                </div>
              </div>
              <div class="add-form-msg"><label>Mensagem</label>
                <textarea id="add-copy-${dayKey}" placeholder="[Nome],&#10;&#10;Escreva a mensagem do disparo aqui…"></textarea>
              </div>
              <div class="add-form-actions">
                <button class="add-form-cancel" onclick="cancelAddForm('${dayKey}')">Cancelar</button>
<button class="add-form-save" onclick="saveNewDisparo('${dayKey}')">Adicionar disparo</button>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    });

    if(!wkVisible) return;

    if(wk.mes !== curMes){
      if(curMes) html += `</div>`;
      curMes = wk.mes;
      const mesLabel = wk.mes==="jun"?"Junho 2026":"Julho 2026";
      html += `<div class="month-block"><div class="month-header"><div class="month-title">${mesLabel}</div><div class="month-meta">${wk.mes==="jun"?"Jun · 2026":"Jul · 2026"}</div></div>`;
    }

    html += `<div class="week-block">
      <div class="week-label">${wk.semana} <span class="week-tema">· ${wk.tema}</span> <span class="week-freq">${wk.freq}</span></div>
      ${daysHtml}
    </div>`;
  });

  if(curMes) html += `</div>`;

  document.getElementById("app").innerHTML = html || `<div class="empty-state">Nenhum resultado para os filtros selecionados.</div>`;
  document.getElementById("counter").innerHTML = `<span>${total}</span> disparos`;
  _totalDisparos = total;
  updateProgress();

  // scroll para hoje
  if(todayId){
    setTimeout(()=>{
      const el = document.getElementById(todayId);
      if(el) el.scrollIntoView({behavior:'smooth', block:'center'});
    }, 150);
  }
}

// ─── Copiar mensagem ───
window.copyMsg = function(id){
  const el = document.getElementById("copy-"+id);
  if(!el) return;
  const assuntoEl = el.closest('.cell')?.querySelector('.copy-assunto');
  let text = assuntoEl ? assuntoEl.textContent.trim()+'\n\n' : '';
  text += el.innerText;
  navigator.clipboard.writeText(text).then(()=>{
    const iconEl = document.getElementById("copy-icon-"+id);
    const btn = document.getElementById("btn-copy-"+id);
    if(iconEl){ iconEl.innerHTML = SVG_CHECK_SM; }
    if(btn) btn.classList.add('copied');
    setTimeout(()=>{
      if(iconEl) iconEl.innerHTML = SVG_COPY;
      if(btn) btn.classList.remove('copied');
    }, 1800);
  }).catch(()=>{
    const txt = el.innerText;
    const ta = document.createElement('textarea');
    ta.value = txt; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
  });
};

window.toggleNote = function(id){
  const noteRow = document.getElementById("note-row-"+id);
  const btn = document.querySelector(`#row-${id} .action-btn[title="Anotações"]`);
  if(!noteRow) return;
  const isOpen = noteRow.classList.toggle("open");
  if(isOpen) noteRow.querySelector("textarea").focus();
  btn && btn.classList.toggle("active", isOpen || (noteState[id]||"").length > 0);
};

window.saveNote = function(id, val){
  if(val.trim()) noteState[id] = val; else delete noteState[id];
  localStorage.setItem(NOTE_KEY, JSON.stringify(noteState));
  const btn = document.querySelector(`#row-${id} .action-btn[title="Anotações"]`);
  btn && btn.classList.toggle("active", !!noteState[id]);
};

window.deleteNote = function(id){
  delete noteState[id];
  localStorage.setItem(NOTE_KEY, JSON.stringify(noteState));
  const noteRow = document.getElementById("note-row-"+id);
  if(noteRow){
    noteRow.querySelector("textarea").value = "";
    noteRow.classList.remove("open");
    const delBtn = noteRow.querySelector(".note-del-btn");
    if(delBtn) delBtn.remove();
  }
  const btn = document.querySelector(`#row-${id} .action-btn[title="Anotações"]`);
  btn && btn.classList.remove("active");
};

window.deleteRow = function(id){
  const wrapper = document.getElementById("row-"+id);
  const noteRow = document.getElementById("note-row-"+id);
  if(wrapper){
    wrapper.style.transition="opacity .25s,max-height .3s";
    wrapper.style.opacity="0";wrapper.style.overflow="hidden";
    wrapper.style.maxHeight=wrapper.offsetHeight+"px";
    setTimeout(()=>{wrapper.style.maxHeight="0";wrapper.style.padding="0";},10);
    if(noteRow) noteRow.style.display="none";
    setTimeout(()=>{wrapper.remove();if(noteRow)noteRow.remove();},320);
  }
  deletedState[id]=true;
  localStorage.setItem(DELETED_KEY, JSON.stringify(deletedState));
};

window.toggleEdit = function(id){
  const el = document.getElementById("copy-"+id);
  const btn = document.getElementById("btn-edit-"+id);
  if(!el) return;
  const isEditing = el.contentEditable==="true";
  if(isEditing){
    el.contentEditable="false";
    copyState[id]=el.innerText;
    localStorage.setItem(COPY_KEY, JSON.stringify(copyState));
    if(btn){btn.innerHTML=SVG_EDIT;btn.classList.remove("editing");btn.title="Editar mensagem";}
  } else {
    el.contentEditable="true";el.focus();
    const range=document.createRange();range.selectNodeContents(el);range.collapse(false);
    const sel=window.getSelection();sel.removeAllRanges();sel.addRange(range);
    if(btn){btn.innerHTML=SVG_SAVE;btn.classList.add("editing");btn.title="Salvar edição";}
  }
};

window.toggleDay = function(header){
  const rows = header.nextElementSibling;
  if(!rows||!rows.classList.contains("day-rows")) return;
  const isOpen = header.classList.toggle("open");
  rows.classList.toggle("open", isOpen);
};

window.showAddForm = function(dayKey){
  const form = document.getElementById("add-form-"+dayKey);
  if(!form) return;
  form.classList.add("open");
  const rows = document.getElementById("day-rows-"+dayKey);
  if(rows&&!rows.classList.contains("open")){
    rows.classList.add("open");
    const h=rows.previousElementSibling;if(h)h.classList.add("open");
  }
  setTimeout(()=>{const ta=document.getElementById("add-copy-"+dayKey);if(ta)ta.focus();},50);
};

window.cancelAddForm = function(dayKey){
  const form=document.getElementById("add-form-"+dayKey);
  if(!form) return;
  form.classList.remove("open");
  ["add-seg-","add-canal-","add-assunto-","add-copy-"].forEach((p,i)=>{
    const el=document.getElementById(p+dayKey);
    if(!el) return;
    if(i===0) el.value="Carteira";
    else if(i===1) el.value="E-mail";
    else el.value="";
  });
};

window.saveNewDisparo = function(dayKey){
  const seg    = document.getElementById("add-seg-"+dayKey)?.value;
  const canal  = document.getElementById("add-canal-"+dayKey)?.value;
  const assunto= document.getElementById("add-assunto-"+dayKey)?.value.trim();
  const copy   = document.getElementById("add-copy-"+dayKey)?.value.trim();
  if(!copy){alert("Escreva a mensagem do disparo antes de adicionar.");return;}
  if(!addedState[dayKey]) addedState[dayKey]=[];
  const uid = Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  addedState[dayKey].push({seg,canal,assunto:assunto||"",copy,uid});
  localStorage.setItem(ADDED_KEY, JSON.stringify(addedState));
  render();
};

window.deleteAddedRow = function(dayKey, uid){
  if(!addedState[dayKey]) return;
  addedState[dayKey]=addedState[dayKey].filter(d=>d.uid!==uid);
  if(addedState[dayKey].length===0) delete addedState[dayKey];
  localStorage.setItem(ADDED_KEY, JSON.stringify(addedState));
  render();
};


document.getElementById("mesFilter").addEventListener("click", e=>{
  const btn = e.target.closest(".fbtn[data-mes]");
  if(!btn) return;
  const mes = btn.dataset.mes;
  if(state.mes.has(mes)){
    if(state.mes.size===1) return;
    state.mes.delete(mes);btn.classList.remove("active");
  } else {
    state.mes.add(mes);btn.classList.add("active");
  }
  render();
});

render();
</script>
</body>
</html>
